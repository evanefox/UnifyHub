          </style><div class="uh-wrap"><div class="uh-kicker">UnifyHub</div><h1>Plugins</h1><p class="uh-subtitle">Enable, disable, import, delete, and apply UnifyHub plugins. Applying changes rebuilds the target and takes effect after restart.</p><div class="uh-meta" hidden aria-hidden="true"><b>Target</b><span data-field="target"></span><b>Root</b><span data-field="root"></span></div><div class="uh-toolbar"><div class="uh-toolbar-left">${button("Refresh", "refresh")}${button("Install plugin", "install")}</div><div class="uh-toolbar-right"><label class="uh-search-wrap" data-field="search-wrap"><span class="uh-search-icon" aria-hidden="true">${searchIcon}</span><input class="uh-search" data-field="search" placeholder="Search" type="search"><div class="MuiInputAdornment-root MuiInputAdornment-positionEnd MuiInputAdornment-outlined MuiInputAdornment-sizeMedium css-3o8z43 uh-search-clear-adornment"><button class="MuiButtonBase-root MuiIconButton-root MuiIconButton-sizeSmall css-1uvbf3 uh-search-clear" tabindex="0" type="button" data-action="clear-search" aria-label="Clear button">${clearIcon}</button></div></label>${button("Apply", "apply", "primary")}</div></div><div class="uh-status" data-field="status"></div><div class="uh-list" data-field="plugins"></div><div data-field="dialog"></div></div>`;
          mountPage(page);
          page.addEventListener("click", onPageClick);
          page.addEventListener("change", onPageChange);
          page.addEventListener("input", onPageInput);
          page.addEventListener("contextmenu", onPageContextMenu);
          document.removeEventListener("contextmenu", onPageContextMenu, true);
          document.addEventListener("contextmenu", onPageContextMenu, true);
          page.addEventListener("keydown", onPageKeyDown);
          return page;
        }

        async function refresh() {
          const api = bridge();
          if (!api) {
            statusText = "UnifyHub bridge is not available. Reinstall the plugin-manager plugin and restart the dummy target.";
            render();
            return;
          }
          try {
            state = await api.listPlugins();
            rememberAppliedConfigBaseline();
            statusText ||= "";
          } catch (error) {
            statusText = error.message || String(error);
          }
          render();
        }

        function render() {
          const page = ensurePage();
          positionPage(page);
          syncPluginTheme(page);
          page.querySelector('[data-field="target"]').textContent = state.target || "unknown";
          page.querySelector('[data-field="root"]').textContent = state.root || "unknown";
          page.querySelector('[data-field="status"]').textContent = statusText;
          const search = page.querySelector('[data-field="search"]');
          if (search && search.value !== searchText) search.value = searchText;
          page.querySelector('[data-field="search-wrap"]')?.classList.toggle("has-value", Boolean(searchText));
          const clearSearch = page.querySelector(".uh-search-clear-adornment");
          if (clearSearch) clearSearch.style.display = searchText ? "flex" : "none";
          const list = page.querySelector('[data-field="plugins"]');
          const normalizedSearch = searchText.trim().toLowerCase();
          const plugins = normalizedSearch
            ? (state.plugins || []).filter((plugin) => [plugin.id, plugin.name, plugin.description, plugin.path].some((value) => String(value || "").toLowerCase().includes(normalizedSearch)))
            : (state.plugins || []);
          list.innerHTML = plugins.length ? plugins.map(pluginCard).join("") : emptyState(Boolean(normalizedSearch));
          page.querySelector('[data-field="dialog"]').innerHTML = "";
          ensurePortalRoot().innerHTML = uninstallDialog() || applyDialog() || configDialog();
        }

        function menuItems() {
          return [...document.querySelectorAll(`#${managerId} #manage-menu [role="menuitem"]:not([aria-disabled="true"])`)];
        }

        function focusManageMenu(index = 0) {
          const items = menuItems();
          if (!items.length) return;
          const nextIndex = Math.max(0, Math.min(items.length - 1, index));
          items.forEach((item, itemIndex) => item.tabIndex = itemIndex === nextIndex ? 0 : -1);
          document.documentElement.classList.add("uh-keyboard-mode");
          items[nextIndex].focus({ preventScroll: true });
        }

        function closeManageMenu() {
          if (!openManageFor) return;
          window.clearTimeout(manageCloseTimer);
          closingManageFor = openManageFor;
          openManageFor = "";
          manageOpenedByCursor = false;
          render();
          manageCloseTimer = window.setTimeout(() => {
            if (!openManageFor) {
              closingManageFor = "";
              document.getElementById("manage-menu")?.remove();
            }
          }, 120);
        }

        function closeUninstallDialog() {
          if (!pendingUninstallId) return;
          window.clearTimeout(dialogCloseTimer);
          closingUninstallId = pendingUninstallId;
          pendingUninstallId = "";
          render();
          dialogCloseTimer = window.setTimeout(() => {
            if (!pendingUninstallId) {
              closingUninstallId = "";
              render();
            }
          }, 120);
        }

        function computeManageMenuPosition(buttonRect, menuHeight = 178, menuWidth = 152, options = {}) {
          const menuGap = options.cursor ? 8 : 4;
          const margin = 8;
          const height = Math.max(1, menuHeight);
          if (options.cursor) {
            const cursorX = buttonRect?.left || margin;
            const cursorY = buttonRect?.top || margin;
            const spaceBelow = window.innerHeight - cursorY - menuGap - margin;
            const spaceAbove = cursorY - menuGap - margin;
            const opensUp = spaceBelow < height && spaceAbove > spaceBelow;
            const available = Math.max(80, opensUp ? spaceAbove : spaceBelow);
            const preferredTop = opensUp ? cursorY - Math.min(height, available) - menuGap : cursorY + menuGap;
            const left = Math.max(margin, Math.min(window.innerWidth - menuWidth - margin, cursorX));
            const top = Math.max(margin, Math.min(window.innerHeight - Math.min(height, available) - margin, preferredTop));
            const originX = Math.max(8, Math.min(menuWidth - 8, cursorX - left));
            const originY = opensUp ? Math.min(height, available) : 0;
            return { top, left, maxHeight: available < height ? available : 0, origin: `${Math.round(originX)}px ${Math.round(originY)}px` };
          }
          const anchorTop = buttonRect?.top || margin;
          const anchorBottom = buttonRect?.bottom || anchorTop;
          const spaceBelow = window.innerHeight - anchorBottom - menuGap - margin;
          const spaceAbove = anchorTop - menuGap - margin;
          const opensUp = spaceBelow < height && spaceAbove > spaceBelow;
          const available = Math.max(80, opensUp ? spaceAbove : spaceBelow);
          const preferredTop = opensUp ? anchorTop - Math.min(height, available) - menuGap : anchorBottom + menuGap;
          const top = Math.max(margin, Math.min(window.innerHeight - Math.min(height, available) - margin, preferredTop));
          const left = Math.max(margin, Math.min(window.innerWidth - menuWidth - margin, (buttonRect?.right || menuWidth) - menuWidth));
          const originX = Math.max(8, Math.min(menuWidth - 8, ((buttonRect?.left || left) + ((buttonRect?.width || menuWidth) / 2)) - left));
          return { top: Math.max(margin, top), left, maxHeight: available < height ? available : 0, origin: `${Math.round(originX)}px ${opensUp ? "100%" : "0px"}` };
        }

        function refineManageMenuPosition(pluginId, options = {}) {
          const menu = document.querySelector(`#${managerId} #manage-menu .css-cvm34e`);
          const button = document.getElementById(`manage-button-${pluginId}`);
          if (!menu || !button || openManageFor !== pluginId) return false;
          const menuRect = menu.getBoundingClientRect();
          const list = menu.querySelector(".MuiMenu-list");
          const fullHeight = Math.max(menuRect.height, menu.scrollHeight, list?.scrollHeight || 0);
          const next = computeManageMenuPosition(options.anchorRect || button.getBoundingClientRect(), Math.round(fullHeight), Math.round(menuRect.width || 156), options);
          const changed =
            Math.abs((manageMenuPosition.top || 0) - next.top) > 1 ||
            Math.abs((manageMenuPosition.left || 0) - next.left) > 1 ||
            manageMenuPosition.origin !== next.origin;
          if (!changed) return false;
          manageMenuPosition = next;
          render();
          return true;
        }

        function openManageMenu(pluginId, anchorRect, options = {}) {
          window.clearTimeout(manageCloseTimer);
          closingManageFor = "";
          manageOpenedByCursor = !!options.cursor;
          openManageFor = pluginId;
          manageMenuPosition = computeManageMenuPosition(anchorRect, 149, 152, options);
          render();
          requestAnimationFrame(() => refineManageMenuPosition(pluginId, { ...options, anchorRect }));
          requestAnimationFrame(() => {
            if (openManageFor !== pluginId || options.cursor || !options.focusOnOpen) return;
            focusManageMenu(0);
          });
        }

        function onPageKeyDown(event) {
          const items = menuItems();
          if (!items.length) return;
          const activeIndex = Math.max(0, items.indexOf(document.activeElement));
          if (event.key === "Escape") {
            event.preventDefault();
            closeManageMenu();
            return;
          }
          if (event.key === "ArrowDown" || event.key === "ArrowUp" || event.key === "Home" || event.key === "End") {
            event.preventDefault();
            const nextIndex =
              event.key === "Home" ? 0 :
              event.key === "End" ? items.length - 1 :
              event.key === "ArrowDown" ? (activeIndex + 1) % items.length :
              (activeIndex - 1 + items.length) % items.length;
            focusManageMenu(nextIndex);
            return;
          }
          if ((event.key === "Enter" || event.key === " ") && items.includes(document.activeElement)) {
            event.preventDefault();
            document.activeElement.click();
          }
        }

        async function onPageClick(event) {
          const action = event.target.closest("[data-action]")?.dataset.action;
          if (!action) return;
          try {
            if (action.startsWith("manage:")) {
              syncOpenPagePosition();
              const pluginId = action.slice(7);
              const rect = event.target.closest("button")?.getBoundingClientRect();
              const focusOnOpen = event.detail === 0 || document.documentElement.classList.contains("uh-keyboard-mode");
              openManageMenu(pluginId, rect, { focusOnOpen });
              return;
            }
            if (action === "close-manage") { closeManageMenu(); return; }
            if (action === "dialog-cancel") { if (event.target.closest(".css-jws3r8") && !event.target.closest("button[data-action='dialog-cancel']")) return; closeUninstallDialog(); return; }
            if (action === "clear-search") { searchText = ""; render(); document.querySelector(`#${managerId} [data-field="search"]`)?.focus({ preventScroll: true }); return; }
            if (action === "apply") { applyDialogOpen = true; applyDialogError = ""; applyDialogBusy = false; statusText = ""; render(); return; }
            if (action === "apply-cancel") { if (event.target.closest(".css-jws3r8") && !event.target.closest("button[data-action='apply-cancel']")) return; if (applyDialogBusy) return; applyDialogOpen = false; applyDialogError = ""; render(); return; }
            if (action === "config-cancel") { if (event.target.closest(".css-jws3r8") && !event.target.closest("button[data-action='config-cancel']")) return; configDialogPluginId = ""; render(); return; }
            const api = bridge();
            if (!api) return;
            if (action === "refresh") await refresh();
            else if (action === "install") { statusText = "Select the plugin you wish to install."; render(); const result = await api.installPlugin(); statusText = result.canceled ? "Install canceled." : "Plugin installed. Enable it, then apply changes."; await refresh(); }
            else if (action === "apply-confirm") { applyDialogBusy = true; applyDialogError = ""; render(); const result = await (api.restartApplyPlugins ? api.restartApplyPlugins() : api.applyPlugins()); applyDialogBusy = false; if (result.ok) { rememberAppliedConfigBaseline(true); applyDialogOpen = false; statusText = result.restarting ? "Restarting Unity Hub." : `Apply complete. Restart Unity Hub.\n${result.stdout || ""}`; } else { applyDialogError = formatApplyError(result); } render(); }
            else if (action === "restore") { statusText = "Restoring target backup."; render(); const result = await api.restoreTarget(); statusText = result.ok ? `Restore complete. Restart Unity Hub.\n${result.stdout || ""}` : `Restore failed.\n${result.stderr || result.error || ""}`; render(); }
            else if (action.startsWith("toggle-btn:")) { const id = action.slice(11); const plugin = (state.plugins || []).find((item) => item.id === id); if (!plugin || plugin.core) return; state = await api.setPluginEnabled(id, !plugin.enabled); statusText = `${id} ${!plugin.enabled ? "enabled" : "disabled"}. Apply changes and restart.`; render(); }
            else if (action.startsWith("menu:config:")) { configDialogPluginId = action.slice(12); closeManageMenu(); render(); }
            else if (action === "config-save") { if (!configDialogPluginId) return; const values = {}; document.querySelectorAll(`#${managerId} [data-config-key], #${managerId}-portal [data-config-key]`).forEach((input) => { values[input.dataset.configKey] = input.checked; }); const changedId = configDialogPluginId; state = await api.setPluginConfig(changedId, values); statusText = `${changedId} config saved. Apply changes and restart.`; configDialogPluginId = ""; render(); }
            else if (action.startsWith("menu:explorer:")) { const id = action.slice(14); closeManageMenu(); const result = await api.openPluginFolder(id); statusText = result?.ok ? `Opened ${id} plugin folder.` : `Could not open ${id} plugin folder.`; render(); }
            else if (action.startsWith("menu:reload:")) { const id = action.slice(12); closeManageMenu(); statusText = `${id}: plugin files reloaded in UI. Use Apply enabled to rebuild target.`; await refresh(); }
            else if (action.startsWith("menu:uninstall:")) { window.clearTimeout(dialogCloseTimer); closingUninstallId = ""; pendingUninstallId = action.slice(15); closeManageMenu(); }
            
            else if (action === "dialog-confirm") { if (!pendingUninstallId) return; const id = pendingUninstallId; pendingUninstallId = ""; state = await api.deletePlugin(id); statusText = `Uninstalled ${id}. Apply changes and restart.`; render(); }
          } catch (error) {
            statusText = error.message || String(error);
            render();
          }
        }

        async function onPageChange(event) {
          if (event.target.dataset.configKey) {
            const box = event.target.closest(".css-11p8s00");
            if (box) {
              box.classList.toggle("Mui-checked", event.target.checked);
              const svg = box.querySelector("svg");
              if (svg) svg.outerHTML = checkedIcon(event.target.checked);
            }
            return;
          }
          const action = event.target.dataset.action;
          if (!action?.startsWith("toggle:")) return;
          const api = bridge();
          const id = action.slice(7);
          try {
            state = await api.setPluginEnabled(id, event.target.checked);
            statusText = `${id} ${event.target.checked ? "enabled" : "disabled"}. Apply changes and restart.`;
          } catch (error) {
            statusText = error.message || String(error);
          }
          render();
        }

        function onPageInput(event) {
          if (event.target.dataset.field !== "search") return;
          searchText = event.target.value || "";
          render();
          event.target.focus({ preventScroll: true });
        }

        function onPageContextMenu(event) {
          const page = document.getElementById(managerId);
          const list = page?.querySelector('[data-field="plugins"]');
          const pathCard = event.composedPath?.().find((node) => node?.classList?.contains?.("uh-plugin-card"));
          const card = pathCard || event.target.closest?.(".uh-plugin-card");
          if (!list || !card || !list.contains(card)) return;
          const rect = card.getBoundingClientRect();
          if (event.clientX < rect.left || event.clientX > rect.right || event.clientY < rect.top || event.clientY > rect.bottom) return;
          const pluginId = card.dataset.pluginId;
          if (!pluginId) return;
          event.preventDefault();
          event.stopPropagation();
          syncOpenPagePosition();
          openManageMenu(pluginId, {
            left: event.clientX,
            right: event.clientX,
            top: event.clientY,
            bottom: event.clientY,
            width: 0,
            height: 0
          }, { cursor: true });
        }

        function formatApplyError(result) {
          const raw = result?.stderr || result?.error || "Unknown apply error.";
          if (String(raw).includes("EBUSY") || String(raw).includes("resource busy or locked")) {
            return "Unity Hub could not restart automatically.\n\nClose Unity Hub and try Restart again.";
          }
          return "The changes could not finish.\n\nTry Restart again.";
        }

        async function showManager() {
          ensureNav();
          syncPluginTheme();
          observeLayoutTargets();
          const page = ensurePage();
          page.classList.add("is-open");
          setPluginNavActive(true);
          repairPluginNavActive(900);
          positionPage(page);
          schedulePositionSync(650);
          await refresh();
        }

        function syncPluginRoute() {
          if (location.hash === "#plugins") {
            void showManager();
          }
        }

        function hideManagerOnNativeNav(event) {
          if (event.target.closest(`#${navId}`) || event.target.closest(`#${managerId}`)) return;
          if (event.target.closest(".MuiDialog-root, .MuiModal-root, .MuiPopover-root, [role='dialog']")) return;
          if (event.target.closest(".cloudui-side-nav-footer")) return;
          if (event.target.closest(".cloudui-side-nav-row")) {
            document.getElementById(managerId)?.classList.remove("is-open");
            setPluginNavActive(false);
          }
        }

        const observer = new MutationObserver(() => {
          ensureNav();
          observeLayoutTargets();
          syncPluginTheme();
          reselectPluginNavIfOpen();
          schedulePositionSync(320);
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
        const themeObserver = new MutationObserver(() => {
          syncPluginTheme();
          reselectPluginNavIfOpen();
        });
        themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ["class", "style"] });
        if (document.body) themeObserver.observe(document.body, { attributes: true, attributeFilter: ["class", "style"] });
        document.addEventListener("keydown", (event) => {
          if (event.metaKey || event.ctrlKey || event.altKey) return;
          if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Home", "End", "Tab", "Enter", " "].includes(event.key)) {
            document.documentElement.classList.add("uh-keyboard-mode");
          }
        }, true);
        document.addEventListener("pointerdown", () => document.documentElement.classList.remove("uh-keyboard-mode"), true);
        document.addEventListener("mousedown", () => document.documentElement.classList.remove("uh-keyboard-mode"), true);
        document.addEventListener("focusin", (event) => {
          if (!document.getElementById(managerId)?.classList.contains("is-open")) return;
          if (event.target.closest(`#${navId}`) || event.target.closest(`#${managerId}`)) return;
          if (event.target.closest(".cloudui-side-nav-row")) reselectPluginNavIfOpen();
        }, true);
        document.addEventListener("keydown", (event) => {
          if (!["ArrowUp", "ArrowDown", "Home", "End", "Tab"].includes(event.key)) return;
          if (document.getElementById(managerId)?.classList.contains("is-open")) reselectPluginNavIfOpen();
        }, true);
        document.addEventListener("click", (event) => {
          const collapseControl = event.target.closest("[data-testid='sidenav-collapse'], [aria-label='collapse'], [aria-label='expand'], [aria-expanded]");
          if (collapseControl) schedulePositionSync(900);
          hideManagerOnNativeNav(event);
        }, true);
        document.addEventListener("transitionend", () => schedulePositionSync(240), true);
        window.addEventListener("resize", () => schedulePositionSync(320));
        window.addEventListener("hashchange", syncPluginRoute);
        installStartupOverflowGuard();
        ensureNav();
        observeLayoutTargets();
        syncPluginRoute();
        setTimeout(() => { ensureNav(); observeLayoutTargets(); schedulePositionSync(500); }, 500);
        setTimeout(() => { ensureNav(); observeLayoutTargets(); schedulePositionSync(500); }, 1500);
        setTimeout(syncPluginRoute, 250);
        setTimeout(syncPluginRoute, 1200);
        console.log("[UnifyHub] plugin manager renderer loaded");
      })();
    </script>
